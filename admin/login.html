<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Masuk — Vinvite Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/admin.css" />
</head>
<body>

<div class="auth-screen">
  <div class="auth-card">
    <p class="auth-logo">Vinvite</p>
    <p class="auth-sub">Panel khusus Owner &amp; Reseller</p>

    <p class="auth-error" id="auth-error"></p>

    <form id="login-form">
      <div class="field"><label>Email</label><input type="email" name="email" required /></div>
      <div class="field"><label>Kata Sandi</label><input type="password" name="password" required /></div>
      <button type="submit" class="btn btn-primary btn-block">Masuk</button>
    </form>

    <p style="text-align:center;font-size:.76rem;color:var(--grey);margin-top:20px;">
      Belum punya akun reseller? Hubungi Owner untuk dibuatkan akun.
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../engine/config.js"></script>
<script src="../engine/supabase-client.js"></script>
<script src="js/admin-common.js"></script>
<script>
  const loginForm = document.getElementById("login-form");
  const errorEl = document.getElementById("auth-error");

  function showError(msg) {
    errorEl.textContent = msg;
    errorEl.classList.add("visible");
  }

  loginForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const client = window.getVinviteClient();
    if (!client) return showError("Supabase belum dikonfigurasi. Isi engine/config.js terlebih dahulu.");
    const fd = new FormData(loginForm);
    const { error } = await client.auth.signInWithPassword({
      email: fd.get("email"), password: fd.get("password"),
    });
    if (error) return showError(error.message);
    window.location.href = "dashboard.html";
  });
</script>
</body>
</html>
