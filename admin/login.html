<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Masuk — Vinvite Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/admin.css" />
</head>
<body>

<div class="auth-screen">
  <div class="auth-card">
    <p class="auth-logo">Vinvite</p>
    <p class="auth-sub">Kelola undangan pernikahan digital kamu</p>

    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login">Masuk</button>
      <button class="auth-tab" data-tab="register">Daftar</button>
    </div>

    <p class="auth-error" id="auth-error"></p>

    <form id="login-form">
      <div class="field"><label>Email</label><input type="email" name="email" required /></div>
      <div class="field"><label>Kata Sandi</label><input type="password" name="password" required /></div>
      <button type="submit" class="btn btn-primary btn-block">Masuk</button>
    </form>

    <form id="register-form" hidden>
      <div class="field"><label>Nama Lengkap</label><input type="text" name="full_name" required /></div>
      <div class="field"><label>Email</label><input type="email" name="email" required /></div>
      <div class="field"><label>Kata Sandi</label><input type="password" name="password" minlength="6" required /></div>
      <button type="submit" class="btn btn-primary btn-block">Buat Akun</button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../engine/config.js"></script>
<script src="../engine/supabase-client.js"></script>
<script src="js/admin-common.js"></script>
<script>
  const tabs = document.querySelectorAll(".auth-tab");
  const loginForm = document.getElementById("login-form");
  const registerForm = document.getElementById("register-form");
  const errorEl = document.getElementById("auth-error");

  tabs.forEach(tab => tab.addEventListener("click", () => {
    tabs.forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    const isLogin = tab.dataset.tab === "login";
    loginForm.hidden = !isLogin;
    registerForm.hidden = isLogin;
    errorEl.classList.remove("visible");
  }));

  function showError(msg) {
    errorEl.textContent = msg;
    errorEl.classList.add("visible");
  }

  loginForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const client = window.getVinviteClient();
    if (!client) return showError("Supabase belum dikonfigurasi. Isi engine/config.js terlebih dahulu.");
    const fd = new FormData(loginForm);
    const { error } = await client.auth.signInWithPassword({
      email: fd.get("email"), password: fd.get("password"),
    });
    if (error) return showError(error.message);
    window.location.href = "dashboard.html";
  });

  registerForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const client = window.getVinviteClient();
    if (!client) return showError("Supabase belum dikonfigurasi. Isi engine/config.js terlebih dahulu.");
    const fd = new FormData(registerForm);
    const { data, error } = await client.auth.signUp({
      email: fd.get("email"), password: fd.get("password"),
    });
    if (error) return showError(error.message);

    if (data.user) {
      await client.from("profiles").insert({
        id: data.user.id, full_name: fd.get("full_name"), role: "customer",
      });
    }
    window.location.href = "dashboard.html";
  });
</script>
</body>
</html>
