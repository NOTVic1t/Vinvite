<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pilih Tema — Vinvite Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../css/admin.css" />
<style>
  .theme-pick-grid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
  .theme-pick-card { background: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 18px; }
  .theme-pick-card h4 { font-size: 1rem; margin-bottom: 4px; }
  .theme-pick-card .cat { font-size: .75rem; color: var(--grey); margin-bottom: 14px; display: block; }
  .theme-pick-card.current { border-color: var(--emerald); box-shadow: 0 0 0 2px var(--emerald) inset; }
  .theme-pick-actions { display: flex; gap: 8px; flex-wrap: wrap; }
</style>
</head>
<body>

<div class="mobile-topbar">
  <button id="sidebar-toggle">☰</button>
  <span class="auth-logo" style="margin:0;">Vinvite</span>
  <span></span>
</div>

<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="topbar"><h1>Pilih Tema</h1></div>
    <div class="content">
      <p style="color:var(--grey);font-size:.85rem;margin-bottom:20px;">Tema yang dipilih akan langsung digunakan untuk undanganmu.</p>
      <div class="theme-pick-grid" id="theme-pick-grid"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../../engine/config.js"></script>
<script src="../../engine/supabase-client.js"></script>
<script src="../js/admin-common.js"></script>
<script>
  (async function () {
    const auth = await window.requireAuth("..");
    if (!auth) return;
    window.renderAdminSidebar("tema", "..", auth.profile);
    window.initMobileSidebarToggle();

    const client = window.getVinviteClient();
    const { data: invitation } = await client
      .from("invitations").select("id, theme_slug").eq("user_id", auth.user.id)
      .order("created_at", { ascending: false }).limit(1).maybeSingle();

    const res = await fetch("../../themes/themes.json");
    const themes = await res.json();

    const grid = document.getElementById("theme-pick-grid");
    grid.innerHTML = themes.map(t => `
      <div class="theme-pick-card ${invitation && invitation.theme_slug === t.slug ? "current" : ""}" data-slug="${t.slug}">
        <h4>${t.name}</h4>
        <span class="cat">${t.category} ${t.status === "planned" ? "· Segera Hadir" : ""}</span>
        <div class="theme-pick-actions">
          <a class="btn btn-outline btn-sm" target="_blank" href="../../themes/${t.slug}/index.html">Pratinjau</a>
          <button class="btn btn-dark btn-sm select-btn" ${!invitation ? "disabled" : ""}>${invitation && invitation.theme_slug === t.slug ? "Dipilih ✓" : "Pilih"}</button>
        </div>
      </div>
    `).join("");

    if (!invitation) {
      window.vinviteToast("Isi data undangan terlebih dahulu sebelum memilih tema.");
    }

    grid.querySelectorAll(".select-btn").forEach(btn => {
      btn.addEventListener("click", async () => {
        const slug = btn.closest(".theme-pick-card").dataset.slug;
        const { error } = await client.from("invitations").update({ theme_slug: slug }).eq("id", invitation.id);
        if (error) return window.vinviteToast("Gagal memilih tema: " + error.message);
        window.vinviteToast("Tema diperbarui ✓");
        document.querySelectorAll(".theme-pick-card").forEach(c => c.classList.remove("current"));
        btn.closest(".theme-pick-card").classList.add("current");
        grid.querySelectorAll(".select-btn").forEach(b => b.textContent = "Pilih");
        btn.textContent = "Dipilih ✓";
      });
    });
  })();
</script>
</body>
</html>
