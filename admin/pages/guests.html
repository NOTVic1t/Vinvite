<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Daftar Tamu — Vinvite Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../css/admin.css" />
</head>
<body>

<div class="mobile-topbar">
  <button id="sidebar-toggle">☰</button>
  <span class="auth-logo" style="margin:0;">Vinvite</span>
  <span></span>
</div>

<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="topbar"><h1>Daftar Tamu</h1></div>
    <div class="content">
      <div id="client-subnav"></div>

      <div class="card">
        <h3 class="card-title">Import dari Excel/CSV</h3>
        <p style="font-size:.8rem;color:var(--grey);margin-bottom:14px;">
          Kolom yang dibaca: <strong>Nama</strong> (wajib), WhatsApp, Grup, Sesi (akad/resepsi/both).
          <button type="button" id="download-template-btn" style="background:none;border:none;color:var(--emerald);font-weight:600;cursor:pointer;text-decoration:underline;padding:0;font-size:inherit;">Unduh template</button>
        </p>
        <input type="file" id="import-file-input" accept=".xlsx,.xls,.csv" style="margin-bottom:14px;" />
        <div id="import-preview" hidden>
          <div class="table-wrap" style="max-height:260px;overflow-y:auto;">
            <table>
              <thead><tr><th>Nama</th><th>WhatsApp</th><th>Grup</th><th>Sesi</th></tr></thead>
              <tbody id="import-preview-tbody"></tbody>
            </table>
          </div>
          <button class="btn btn-primary" id="confirm-import-btn" style="margin-top:14px;">Import Semua Tamu</button>
        </div>
      </div>

      <div class="card">
        <h3 class="card-title">Tambah Tamu Manual</h3>
        <form id="guest-form">
          <div class="field-row two">
            <div class="field"><label>Nama Tamu</label><input name="name" required /></div>
            <div class="field"><label>No. WhatsApp</label><input name="phone" placeholder="08xxxxxxxxxx" /></div>
          </div>
          <div class="field-row two">
            <div class="field"><label>Grup</label><input name="group_label" placeholder="Keluarga, Kantor, Kampus..." /></div>
            <div class="field">
              <label>Diundang ke</label>
              <select name="invited_session">
                <option value="both">Akad & Resepsi</option>
                <option value="akad">Akad saja</option>
                <option value="resepsi">Resepsi saja</option>
              </select>
            </div>
          </div>
          <button type="submit" class="btn btn-primary">Tambah Tamu</button>
        </form>
      </div>

      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:16px;">
          <h3 class="card-title" style="margin-bottom:0;">Tamu Terdaftar</h3>
          <button class="btn btn-outline btn-sm" id="export-guests-btn">Export ke Excel</button>
        </div>
        <div class="table-wrap">
          <table id="guest-table">
            <thead><tr><th>Nama</th><th>WhatsApp</th><th>Grup</th><th>Sesi</th><th>Link Undangan</th><th></th></tr></thead>
            <tbody id="guest-tbody"></tbody>
          </table>
        </div>
        <p class="empty-state" id="guest-empty" hidden><h3>Belum ada tamu</h3><p>Tambahkan tamu pertama untuk klien ini di atas.</p></p>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="../../engine/config.js"></script>
<script src="../../engine/supabase-client.js"></script>
<script src="../js/admin-common.js"></script>
<script src="../js/admin-excel.js"></script>
<script>
  let invitation = null;
  let pendingImportRows = [];
  const client = () => window.getVinviteClient();

  document.getElementById("download-template-btn").addEventListener("click", () => {
    window.downloadGuestTemplate();
  });

  document.getElementById("import-file-input").addEventListener("change", async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      const rawRows = await window.parseExcelFile(file);
      pendingImportRows = window.mapRowsToGuests(rawRows);
      const tbody = document.getElementById("import-preview-tbody");
      if (!pendingImportRows.length) {
        window.vinviteToast("Tidak ada baris valid ditemukan — pastikan ada kolom 'Nama'.");
        document.getElementById("import-preview").hidden = true;
        return;
      }
      tbody.innerHTML = pendingImportRows.map(r => `
        <tr><td>${r.name}</td><td>${r.phone || "—"}</td><td>${r.group_label || "—"}</td><td>${r.invited_session}</td></tr>
      `).join("");
      document.getElementById("import-preview").hidden = false;
      window.vinviteToast(`${pendingImportRows.length} baris siap diimpor ✓`);
    } catch (err) {
      window.vinviteToast("Gagal membaca file: " + err.message);
    }
  });

  document.getElementById("confirm-import-btn").addEventListener("click", async () => {
    if (!pendingImportRows.length || !invitation) return;
    const payload = pendingImportRows.map(r => ({ ...r, invitation_id: invitation.id }));
    const { error } = await client().from("guests").insert(payload);
    if (error) return window.vinviteToast("Gagal mengimpor: " + error.message);
    window.vinviteToast(`${payload.length} tamu berhasil diimpor ✓`);
    pendingImportRows = [];
    document.getElementById("import-preview").hidden = true;
    document.getElementById("import-file-input").value = "";
    loadGuests();
  });

  document.getElementById("export-guests-btn").addEventListener("click", async () => {
    const { data: guests } = await client().from("guests").select("*").eq("invitation_id", invitation.id).order("created_at", { ascending: false });
    const rows = (guests || []).map(g => ({
      Nama: g.name, WhatsApp: g.phone || "", Grup: g.group_label || "",
      Sesi: g.invited_session, "Sudah Dikirim": g.whatsapp_sent ? "Ya" : "Belum",
    }));
    const coupleName = `${invitation.groom_nickname || invitation.groom_name}-${invitation.bride_nickname || invitation.bride_name}`;
    window.exportToExcel(rows, `tamu-${coupleName}.xlsx`, "Tamu");
  });

  function guestLink(guest) {
    if (!invitation) return "#";
    const base = `${location.origin}${location.pathname.replace(/admin\/pages\/.*/, "")}themes/${invitation.theme_slug}/index.html`;
    return `${base}?slug=${invitation.slug}&to=${encodeURIComponent(guest.name)}`;
  }

  function waText(guest) {
    const link = guestLink(guest);
    const names = `${invitation.groom_nickname || invitation.groom_name} & ${invitation.bride_nickname || invitation.bride_name}`;
    return encodeURIComponent(`Assalamu'alaikum/Halo ${guest.name},\n\nDengan penuh sukacita kami mengundang Bapak/Ibu/Saudara/i untuk hadir di acara pernikahan kami, ${names}.\n\nBerikut undangan digital kami:\n${link}\n\nMohon doa restu & konfirmasi kehadirannya 🙏`);
  }

  async function loadGuests() {
    const { data: guests } = await client().from("guests").select("*").eq("invitation_id", invitation.id).order("created_at", { ascending: false });
    const tbody = document.getElementById("guest-tbody");
    const empty = document.getElementById("guest-empty");

    if (!guests || !guests.length) {
      tbody.innerHTML = "";
      empty.hidden = false;
      return;
    }
    empty.hidden = true;
    tbody.innerHTML = guests.map(g => `
      <tr>
        <td>${g.name}</td>
        <td>${g.phone || "—"}</td>
        <td>${g.group_label || "—"}</td>
        <td><span class="badge grey">${g.invited_session}</span></td>
        <td><a href="${guestLink(g)}" target="_blank" style="font-size:.78rem;">Buka Link</a></td>
        <td style="display:flex;gap:6px;">
          <a class="btn btn-outline btn-sm" target="_blank" href="https://wa.me/?text=${waText(g)}">WA</a>
          <button class="btn btn-danger btn-sm" data-id="${g.id}">Hapus</button>
        </td>
      </tr>
    `).join("");

    tbody.querySelectorAll("button[data-id]").forEach(btn => {
      btn.addEventListener("click", async () => {
        await client().from("guests").delete().eq("id", btn.dataset.id);
        loadGuests();
      });
    });
  }

  (async function () {
    const auth = await window.requireAuth("..");
    if (!auth) return;
    window.renderAdminSidebar("dashboard", "..", auth.profile);
    window.initMobileSidebarToggle();

    const invitationId = window.getInvitationIdFromUrl();
    if (!invitationId) {
      document.querySelector(".content").innerHTML = `<div class="empty-state"><h3>Pilih klien terlebih dahulu</h3><p>Buka dari Dashboard untuk mengelola tamu klien tertentu.</p><a class="btn btn-primary" style="margin-top:14px;" href="../dashboard.html">Ke Dashboard</a></div>`;
      return;
    }

    const { data: inv, error } = await client().from("invitations").select("*").eq("id", invitationId).single();
    if (error || !inv) {
      document.querySelector(".content").innerHTML = `<div class="empty-state"><h3>Klien tidak ditemukan</h3></div>`;
      return;
    }
    invitation = inv;
    window.renderClientSubnav("guests", invitationId, `${inv.groom_nickname || inv.groom_name} & ${inv.bride_nickname || inv.bride_name}`);
    loadGuests();

    document.getElementById("guest-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const payload = Object.fromEntries(fd.entries());
      payload.invitation_id = invitation.id;
      const { error } = await client().from("guests").insert(payload);
      if (error) return window.vinviteToast("Gagal menambah tamu: " + error.message);
      e.target.reset();
      window.vinviteToast("Tamu ditambahkan ✓");
      loadGuests();
    });
  })();
</script>
</body>
</html>
