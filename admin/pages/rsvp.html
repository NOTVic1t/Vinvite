<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RSVP — Vinvite Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../css/admin.css" />
</head>
<body>

<div class="mobile-topbar">
  <button id="sidebar-toggle">☰</button>
  <span class="auth-logo" style="margin:0;">Vinvite</span>
  <span></span>
</div>

<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="topbar"><h1>RSVP</h1></div>
    <div class="content">
      <div id="client-subnav"></div>

      <div class="stat-grid">
        <div class="stat-card"><div class="num" id="stat-total">—</div><div class="label">Total Respon</div></div>
        <div class="stat-card"><div class="num" id="stat-hadir">—</div><div class="label">Hadir</div></div>
        <div class="stat-card"><div class="num" id="stat-tidak">—</div><div class="label">Tidak Hadir</div></div>
        <div class="stat-card"><div class="num" id="stat-ragu">—</div><div class="label">Masih Ragu</div></div>
      </div>

      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:16px;">
          <h3 class="card-title" style="margin-bottom:0;">Semua Respon</h3>
          <button class="btn btn-outline btn-sm" id="export-rsvp-btn">Export ke Excel</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Nama</th><th>Status</th><th>Jumlah</th><th>Pesan</th><th>Waktu</th></tr></thead>
            <tbody id="rsvp-tbody"></tbody>
          </table>
        </div>
        <p class="empty-state" id="rsvp-empty" hidden><h3>Belum ada respon RSVP</h3></p>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="../../engine/config.js"></script>
<script src="../../engine/supabase-client.js"></script>
<script src="../js/admin-common.js"></script>
<script src="../js/admin-excel.js"></script>
<script>
  function badgeFor(status) {
    if (status === "hadir") return '<span class="badge green">Hadir</span>';
    if (status === "tidak_hadir") return '<span class="badge red">Tidak Hadir</span>';
    return '<span class="badge amber">Masih Ragu</span>';
  }

  (async function () {
    const auth = await window.requireAuth("..");
    if (!auth) return;
    window.renderAdminSidebar("dashboard", "..", auth.profile);
    window.initMobileSidebarToggle();

    const invitationId = window.getInvitationIdFromUrl();
    if (!invitationId) {
      document.querySelector(".content").innerHTML = `<div class="empty-state"><h3>Pilih klien terlebih dahulu</h3><p>Buka dari Dashboard untuk melihat RSVP klien tertentu.</p><a class="btn btn-primary" style="margin-top:14px;" href="../dashboard.html">Ke Dashboard</a></div>`;
      return;
    }

    const client = window.getVinviteClient();
    const { data: invitation, error } = await client.from("invitations").select("*").eq("id", invitationId).single();
    if (error || !invitation) {
      document.querySelector(".content").innerHTML = `<div class="empty-state"><h3>Klien tidak ditemukan</h3></div>`;
      return;
    }
    window.renderClientSubnav("rsvp", invitationId, `${invitation.groom_nickname || invitation.groom_name} & ${invitation.bride_nickname || invitation.bride_name}`);

    const { data: rsvps } = await client.from("rsvps").select("*").eq("invitation_id", invitation.id).order("created_at", { ascending: false });

    document.getElementById("export-rsvp-btn").addEventListener("click", () => {
      const rows = (rsvps || []).map(r => ({
        Nama: r.guest_name,
        Status: r.attendance === "hadir" ? "Hadir" : r.attendance === "tidak_hadir" ? "Tidak Hadir" : "Masih Ragu",
        Jumlah: r.guest_count,
        Pesan: r.message || "",
        Waktu: new Date(r.created_at).toLocaleString("id-ID"),
      }));
      const coupleName = `${invitation.groom_nickname || invitation.groom_name}-${invitation.bride_nickname || invitation.bride_name}`;
      window.exportToExcel(rows, `rsvp-${coupleName}.xlsx`, "RSVP");
    });

    const hadir = (rsvps || []).filter(r => r.attendance === "hadir").length;
    const tidak = (rsvps || []).filter(r => r.attendance === "tidak_hadir").length;
    const ragu = (rsvps || []).filter(r => r.attendance === "ragu").length;

    document.getElementById("stat-total").textContent = (rsvps || []).length;
    document.getElementById("stat-hadir").textContent = hadir;
    document.getElementById("stat-tidak").textContent = tidak;
    document.getElementById("stat-ragu").textContent = ragu;

    const tbody = document.getElementById("rsvp-tbody");
    if (!rsvps || !rsvps.length) {
      document.getElementById("rsvp-empty").hidden = false;
      return;
    }
    tbody.innerHTML = rsvps.map(r => `
      <tr>
        <td>${r.guest_name}</td>
        <td>${badgeFor(r.attendance)}</td>
        <td>${r.guest_count}</td>
        <td>${r.message || "—"}</td>
        <td>${new Date(r.created_at).toLocaleString("id-ID")}</td>
      </tr>
    `).join("");
  })();
</script>
</body>
</html>
